---
- name: Generate Config Debug
  template:
    src: "spring_config.j2"
    dest: "debug_configs/{{ inventory_hostname}}_spring_config.txt"
  when: spring_remove == False

- name: Generate Remove Debug
  template:
    src: "spring_remove.j2"
    dest: "debug_configs/{{ inventory_hostname}}_spring_remove.txt"
  when: spring_remove == True

- name: Generate Segment Routing Configuration
  junos_config:
    lines: "{{ lookup('template', 'spring_config.j2').split('\n') }}"
    comment: "Configured SPRING"
  when: spring_remove == False

- name: Generate Segment Routing Removal Configuration
  junos_config:
    lines: "{{ lookup('template', 'spring_remove.j2').split('\n') }}"
    comment: "Configured SPRING"
  when: spring_remove == True
